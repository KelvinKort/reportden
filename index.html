<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>Управленческий dashboard</h1>
        <p class="subtitle">План, факт и воронка по менеджерам</p>
      </div>
      <div class="report-meta">
        <span id="reportDateLabel">Диапазон: —</span>
      </div>
    </header>

    <section class="filters card">
      <div class="filter-group wide">
        <label for="baseUrlInput">Apps Script endpoint</label>
        <input id="baseUrlInput" type="text" placeholder="Вставь URL /exec Apps Script endpoint" />
      </div>
      <div class="filter-group">
        <label for="dateFrom">Дата с</label>
        <input id="dateFrom" type="date" />
      </div>
      <div class="filter-group">
        <label for="dateTo">Дата по</label>
        <input id="dateTo" type="date" />
      </div>
      <div class="filter-group">
        <label for="managerSelect">Менеджер</label>
        <select id="managerSelect">
          <option value="all">Все менеджеры</option>
        </select>
      </div>
      <button id="loadBtn">Загрузить</button>
    </section>

    <section class="kpis" id="kpiGrid"></section>

    <section class="layout-grid">
      <div class="card">
        <div class="card-header"><h2>Менеджеры</h2></div>
        <div class="table-wrap">
          <table id="managerTable">
            <thead>
              <tr>
                <th>Менеджер</th>
                <th>Факт</th>
                <th>Новые сделки</th>
                <th>Сумма новых</th>
                <th>Активная воронка</th>
                <th>Выиграно</th>
                <th>Проиграно</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
      <div class="card side-panel">
        <div class="card-header"><h2>Сводка</h2></div>
        <div id="summaryPanel" class="summary-panel"></div>
      </div>
    </section>

    <section class="card diagnostics">
      <div class="card-header"><h2>Диагностика</h2></div>
      <div id="diagnostics"></div>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
