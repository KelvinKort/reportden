<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Управленческий отчет</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar-banner">
      <h1>УПРАВЛЕНЧЕСКИЙ ОТЧЕТ</h1>
    </header>

    <section class="filters card">
      <div class="filter-group compact">
        <label for="dateFrom">Дата с</label>
        <input id="dateFrom" type="date" />
      </div>
      <div class="filter-group compact">
        <label for="dateTo">Дата по</label>
        <input id="dateTo" type="date" />
      </div>
      <div class="filter-group compact manager-filter">
        <label for="managerSelect">Менеджер</label>
        <select id="managerSelect">
          <option value="all">Все менеджеры</option>
        </select>
      </div>
      <div class="filter-actions">
        <button id="loadBtn">Загрузить</button>
      </div>
    </section>

    <section class="card help-card">
      <div class="help-text">
        <strong>Как обновить данные:</strong>
        1) обнови Google Sheets через <code>refreshAllReports()</code>, 2) вернись сюда и нажми <b>Загрузить</b>.
      </div>
      <div class="report-meta">
        <span id="reportDateLabel">Диапазон: —</span>
      </div>
    </section>

    <section class="kpis" id="kpiGrid"></section>

    <section class="layout-grid">
      <div class="card">
        <div class="card-header"><h2>Менеджеры</h2></div>
        <div class="table-wrap">
          <table id="managerTable">
            <thead>
              <tr>
                <th>Менеджер</th>
                <th>Факт</th>
                <th>План периода</th>
                <th>% плана</th>
                <th>Новые сделки</th>
                <th>Сумма новых</th>
                <th>Активная воронка</th>
                <th>Выиграно</th>
                <th>Проиграно</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
      <div class="card side-panel">
        <div class="card-header"><h2>Сводка</h2></div>
        <div id="summaryPanel" class="summary-panel"></div>
      </div>
    </section>

    <section class="card diagnostics">
      <div id="diagnostics"></div>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
